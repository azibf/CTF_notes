services:
  checker:
    build: ./checker
    ports:
      - "11003:8000"
    networks:
      internal:
        ipv4_address: 172.28.0.10

  internal:
    build: ./internal
    environment:
      - FLAG=flag{redacted}
    networks:
      internal:
        ipv4_address: 172.28.0.2

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
