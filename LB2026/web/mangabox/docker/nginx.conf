server {
    listen 80;
    server_name _;
    root /app/web;
    index index.php;

    charset utf-8;
    client_max_body_size 16M;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(ht|git) {
        deny all;
    }
}
