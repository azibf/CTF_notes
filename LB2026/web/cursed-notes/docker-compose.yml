
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task
  
  task:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "10004:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=task
      - SECRET_KEY=REDACTED
      - ADMIN_PASSWORD=REDACTED
      - FLAG=flag{REDACTED}
    depends_on:
      - db

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "3738:80"
    depends_on:
      - task

